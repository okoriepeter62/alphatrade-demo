<!DOCTYPE html>
<html>
<head>
<title>Send Transfer</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI';
background:#f4f6f9;
color:#333;
margin:0;
padding:20px;
}

form{
max-width:500px;
margin:40px auto;
background:#fff;
padding:25px 30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

form h2{
text-align:center;
margin-bottom:25px;
color:#0b0f2b;
}

input{
width:100%;
padding:12px 15px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#0b0f2b;
color:#fff;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#f9b800;
color:#0b0f2b;
}

.message{
text-align:center;
margin-bottom:15px;
font-weight:500;
border-radius:6px;
padding:10px;
}

.success{
background:#e0fbe0;
color:#28a745;
}

.error{
background:#ffe2e2;
color:#d9534f;
}

</style>
</head>

<body>

<form onsubmit="return sendTransfer()">

<h2>Send Transfer</h2>

<div id="message"></div>

<input type="text" id="receiver" placeholder="Receiver Username" required>

<input type="number" id="amount" placeholder="Amount ($10-$200)" required>

<input type="password" id="pin" placeholder="Enter 4-digit PIN" required maxlength="4">

<button type="submit">Send</button>

</form>

<script>

function sendTransfer(){

let receiver = document.getElementById("receiver").value;

let amount = document.getElementById("amount").value;

let pin = document.getElementById("pin").value;

let message = document.getElementById("message");

if(amount < 10 || amount > 200){

message.innerHTML =
"<div class='message error'>Transfer must be between $10 and $200</div>";

return false;

}

if(pin.length !== 4){

message.innerHTML =
"<div class='message error'>PIN must be 4 digits</div>";

return false;

}

message.innerHTML =
"<div class='message success'>Demo Mode: Transfer submitted successfully.</div>";

return false;

}

</script>

</body>
</html>
