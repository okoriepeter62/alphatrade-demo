<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up</title>
<link rel="stylesheet" href="signup.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="signup-box">

<h2>Create Account</h2>

<p id="message"></p>

<form onsubmit="return validateSignup()">

<input type="text" id="username" placeholder="Username" required>

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<input type="password" id="repassword" placeholder="Repeat Password" required>

<input type="text" placeholder="Referral Code (Optional)">

<button type="submit">Sign Up</button>

</form>


<div class="links">

<a href="index.html">Home</a>

<a href="login.html">Login</a>

</div>


<p class="demo-info">

Demo Account:<br>

Username: <b>demo</b><br>

Password: <b>demo123</b>

</p>

</div>


<script>

function validateSignup(){

let username = document.getElementById("username").value;

let email = document.getElementById("email").value;

let password = document.getElementById("password").value;

let repassword = document.getElementById("repassword").value;

let message = document.getElementById("message");

if(password !== repassword){

message.innerHTML = "Passwords do not match";

message.style.color = "red";

return false;

}

message.innerHTML =
"Demo version: Registration disabled. Please use demo login.";

message.style.color = "green";

return false;

}

</script>

</body>
</html>
